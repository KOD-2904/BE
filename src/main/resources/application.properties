spring.application.name=${APP_NAME:shoe_shop_basic}
app.env=${APP_ENV:local}
app.frontend-url=${FRONTEND_URL:http://localhost:3000}
app.public-domain=${PUBLIC_DOMAIN:http://localhost:8080}
app.cookie-secure=${APP_COOKIE_SECURE:false}
app.cookie-same-site=${APP_COOKIE_SAME_SITE:Lax}
app.init.enabled=${APP_INIT_ENABLED:true}
app.init.admin-email=${APP_INIT_ADMIN_EMAIL:admin@shoe-shop.local}
app.init.admin-password=${APP_INIT_ADMIN_PASSWORD:ChangeMe123!}
app.init.demo-email=${APP_INIT_DEMO_EMAIL:demo@shoe-shop.local}
app.init.demo-password=${APP_INIT_DEMO_PASSWORD:ChangeMe123!}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/shoe_shop_basic?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}

jwt.secret=${JWT_SECRET:local-development-secret-key-change-me-please-32-characters-minimum}
jwt.access-token-expiration=${JWT_ACCESS_EXPIRATION:3600000}
jwt.refresh-token-expiration=${JWT_REFRESH_EXPIRATION:604800000}

cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5500,http://127.0.0.1:5500,http://localhost:3000}

google.oauth.client-id=${GOOGLE_CLIENT_ID:}
google.oauth.client-secret=${GOOGLE_CLIENT_SECRET:}
google.oauth.token-uri=${GOOGLE_TOKEN_URI:https://oauth2.googleapis.com/token}
google.oauth.user-info-uri=${GOOGLE_USER_INFO_URI:https://openidconnect.googleapis.com/v1/userinfo}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
cloudinary.width=${CLOUDINARY_WIDTH:500}
cloudinary.height=${CLOUDINARY_HEIGHT:500}

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

ghn.token=${GHN_TOKEN:}
ghn.shop-id=${GHN_SHOP_ID:0}
ghn.from-district-id=${GHN_FROM_DISTRICT_ID:0}
ghn.from-district-name=${GHN_FROM_DISTRICT_NAME:}
ghn.from-ward-code=${GHN_FROM_WARD_CODE:}
ghn.from-ward-name=${GHN_FROM_WARD_NAME:}
ghn.from-province-code=${GHN_FROM_PROVINCE_CODE:0}
ghn.from-province-name=${GHN_FROM_PROVINCE_NAME:}
ghn.from-detail-address=${GHN_FROM_DETAIL_ADDRESS:}
ghn.api-url=${GHN_API_URL:https://online-gateway.ghn.vn/shiip/public-api/v2}
ghn.mock-enabled=${GHN_MOCK_ENABLED:false}
ghn.master-data-mock-enabled=${GHN_MASTER_DATA_MOCK_ENABLED:false}

spring.cache.type=${CACHE_TYPE:simple}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

vnpay.tmnCode=${VNPAY_TMN_CODE:}
vnpay.hashSecret=${VNPAY_HASH_SECRET:}
vnpay.paymentUrl=${VNPAY_PAYMENT_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
vnpay.returnUrl=${VNPAY_RETURN_URL:http://localhost:8080/api/payment/vnpay-callback}
vnpay.ipnUrl=${VNPAY_IPN_URL:http://localhost:8080/api/payment/vnpay-ipn}
vnpay.version=${VNPAY_VERSION:2.1.0}
vnpay.command=${VNPAY_COMMAND:pay}
vnpay.orderType=${VNPAY_ORDER_TYPE:other}
vnpay.currency=${VNPAY_CURRENCY:VND}
vnpay.locale=${VNPAY_LOCALE:vn}
